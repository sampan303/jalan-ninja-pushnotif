<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Push Widget</title>
  <style>
    body { margin: 0; font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: transparent; }
    .widget-shell { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: transparent; }
    .widget-card { width: 100%; max-width: 360px; padding: 20px; border-radius: 20px; background: #0f172a; color: #eef2ff; box-sizing: border-box; box-shadow: 0 24px 80px rgba(0,0,0,0.24); border: 1px solid rgba(255,255,255,0.08); }
    .widget-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
    .widget-badge { width: 44px; height: 44px; border-radius: 14px; background: linear-gradient(135deg, #4f94ff, #2f80ed); display: flex; align-items: center; justify-content: center; font-size: 20px; }
    .widget-title { margin: 0; font-size: 1rem; line-height: 1.3; }
    .widget-text { margin: 12px 0 18px; color: #cbd5e1; font-size: 0.95rem; line-height: 1.5; }
    .widget-buttons { display: grid; gap: 10px; }
    .widget-button { width: 100%; border: 0; border-radius: 14px; padding: 14px 16px; cursor: pointer; font-weight: 700; font-size: 0.98rem; }
    .widget-button.primary { background: #4f94ff; color: #fff; }
    .widget-button.secondary { background: rgba(255,255,255,0.08); color: #f8fafc; }
    .widget-status { margin-top: 14px; font-size: 0.9rem; color: #94a3b8; }
    .custom-subscribe-html { width: 100%; margin-top: 16px; }
  </style>
</head>
<body>
  <div class="widget-shell">
    <div class="widget-card" role="dialog" aria-label="Aktifkan notifikasi">
      <div class="widget-header">
        <div class="widget-badge">🔔</div>
        <div>
          <h1 class="widget-title">Aktifkan Notifikasi</h1>
          <p class="widget-text">Dapatkan update terbaru langsung di browser Anda jika mengizinkan notifikasi.</p>
        </div>
      </div>
      <div class="widget-buttons">
        <button id="enableBtn" class="widget-button primary">Aktifkan Notifikasi</button>
        <button id="closeBtn" class="widget-button secondary">Nanti</button>
      </div>
      <div id="statusMessage" class="widget-status" aria-live="polite"></div>
    </div>
  </div>
  <div id="customSubscribeHtmlContainer" class="custom-subscribe-html"></div>
  <script>
    (function() {
      console.log('widget-frame loaded');
      function safeLocalStorage(key, value) {
        try {
          if (value === undefined) {
            return window.localStorage.getItem(key);
          }
          window.localStorage.setItem(key, value);
          return true;
        } catch (error) {
          return null;
        }
      }

      function getQueryParam(name) {
        var match = window.location.search.match(new RegExp('[?&]' + name + '=([^&]+)'));
        return match ? decodeURIComponent(match[1]) : null;
      }

      function arrayBufferToBase64(base64String) {
        var padding = '='.repeat((4 - base64String.length % 4) % 4);
        var base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
        var rawData = window.atob(base64);
        var outputArray = new Uint8Array(rawData.length);
        for (var i = 0; i < rawData.length; ++i) {
          outputArray[i] = rawData.charCodeAt(i);
        }
        return outputArray;
      }

      function postStatus(status, message) {
        try {
          window.parent.postMessage({ type: 'push-widget-status', status: status, message: message }, apiOrigin);
        } catch (err) {}
        try {
          safeLocalStorage(storageKey, status);
        } catch (err) {}
        if (message) {
          statusMessage.textContent = message;
        }
      }

      var defaultWidgetInfo = {
        popupTitle: 'Aktifkan Notifikasi',
        popupButtonAktifkan: 'Aktifkan Notifikasi',
        popupButtonTutup: 'Nanti',
        popupText: 'Dapatkan update terbaru langsung di browser Anda jika mengizinkan notifikasi.',
        customSubscribeHtml: '',
        customSubscribeCss: ''
      };

      var appId = getQueryParam('appId') || 'default';
      var apiOrigin = getQueryParam('api') || window.location.origin;
      var storageKey = 'push-widget-status-' + appId;
      var popupTitleEl = document.querySelector('.widget-title');
      var widgetTextEl = document.querySelector('.widget-text');
      var customHtmlContainer = document.getElementById('customSubscribeHtmlContainer');
      var statusMessage = document.getElementById('statusMessage');
      var enableButton = document.getElementById('enableBtn');
      var closeButton = document.getElementById('closeBtn');
      var customCssStyle = document.createElement('style');
      document.head.appendChild(customCssStyle);

      function applyWidgetInfo(info) {
        popupTitleEl.textContent = info.popupTitle || defaultWidgetInfo.popupTitle;
        if (enableButton) enableButton.textContent = info.popupButtonAktifkan || defaultWidgetInfo.popupButtonAktifkan;
        if (closeButton) closeButton.textContent = info.popupButtonTutup || defaultWidgetInfo.popupButtonTutup;
        widgetTextEl.textContent = info.popupText || defaultWidgetInfo.popupText;

        if (info.customSubscribeCss) {
          customCssStyle.textContent = info.customSubscribeCss;
        }

        if (info.customSubscribeHtml) {
          customHtmlContainer.innerHTML = info.customSubscribeHtml;
        } else {
          customHtmlContainer.innerHTML = '';
        }
      }

      async function loadWidgetInfo() {
        var widgetInfoUrl = apiOrigin + '/api/widget-info?appId=' + encodeURIComponent(appId);
        try {
          var response = await fetch(widgetInfoUrl);
          if (!response.ok) {
            console.warn('widget-info fetch failed', response.status);
            return;
          }

          var widgetInfo = await response.json();
          applyWidgetInfo(widgetInfo);
        } catch (error) {
          console.warn('widget-info fetch error', error);
        }
      }

      function showMessage(text) {
        if (statusMessage) {
          statusMessage.textContent = text;
        }
      }

      function attachButtonHandlers() {
        if (!enableButton || !closeButton) {
          console.warn('Widget buttons not found');
          return;
        }

        enableButton.disabled = false;
        closeButton.disabled = false;

        closeButton.addEventListener('click', function() {
          console.log('close clicked');
          window.parent.postMessage({ type: 'push-widget-status', status: 'dismissed' }, '*');
          console.log('message sent');
          showMessage('Notifikasi ditunda.');
        });

        enableButton.addEventListener('click', async function() {
          console.log('enable clicked');
          showMessage('Memproses izin notifikasi...');

          try {
            var permission = await Notification.requestPermission();
            if (permission === 'granted') {
              postStatus('subscribed', 'Notifikasi berhasil diaktifkan.');
              console.log('message sent');
              return;
            }
            postStatus('denied', 'Notifikasi tidak diaktifkan.');
            console.log('message sent');
          } catch (err) {
            postStatus('error', 'Terjadi kesalahan saat meminta izin.');
            console.log('message sent');
          }
        });
      }

      function disableWidget(reason) {
        postStatus('disabled', reason || 'Fitur notifikasi tidak tersedia.');
      }

      function isBrowserSupported() {
        return ('serviceWorker' in navigator) && ('PushManager' in window) && ('Notification' in window) && ('fetch' in window);
      }

      applyWidgetInfo(defaultWidgetInfo);
      loadWidgetInfo();
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', attachButtonHandlers);
      } else {
        attachButtonHandlers();
      }

      if (!isBrowserSupported()) {
        disableWidget('Browser tidak mendukung notifikasi push.');
        return;
      }

      var savedStatus = safeLocalStorage(storageKey);
      if (savedStatus === 'subscribed' || savedStatus === 'denied' || savedStatus === 'dismissed' || savedStatus === 'disabled') {
        disableWidget('Notifikasi sudah diatur.');
        return;
      }
    })();
  </script>
</body>
</html>
